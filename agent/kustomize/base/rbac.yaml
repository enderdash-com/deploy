apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: enderdash-agent
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enderdash-agent
subjects:
  - kind: ServiceAccount
    name: enderdash-agent
    namespace: enderdash
roleRef:
  kind: ClusterRole
  name: enderdash-agent
  apiGroup: rbac.authorization.k8s.io
