services:
  enderdash-agent:
    image: ghcr.io/enderdash-com/enderdash-agent:latest
    container_name: enderdash-agent
    restart: unless-stopped
    environment:
      ENDERDASH_AGENT_KEY: ${ENDERDASH_AGENT_KEY:?set ENDERDASH_AGENT_KEY}
      ENDERDASH_SIGNALING_URL: ${ENDERDASH_SIGNALING_URL:-}
    volumes:
      - enderdash-agent-data:/enderdash/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  enderdash-agent-data:
